<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pedro's Wish List</title>

  <link rel="stylesheet" href="https://unpkg.com/98.css" />

  <style>
    :root {
      --bg: #c0c0c0;
      --ink: #000;
      --ink-soft: #444;
      --link: #0000ee;
      --link-visited: #551a8b;
      --rule: #808080;
    }

    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Pixelated MS Sans Serif", "MS Sans Serif", Tahoma, sans-serif;
      font-size: 12px;
    }

    /* ── shell ── */
    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 22px 18px 64px;
    }
    @media (max-width: 460px) {
      .wrap { padding: 16px 10px 48px; }
      .item .meta-row { font-size: 11px; }
      .item .name { letter-spacing: 0; }
      .item .sub { font-size: 10px; }
    }

    /* ── header ── */
    header.site {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      padding: 6px 0 10px;
      border-bottom: 1px solid var(--ink);
    }
    .brand {
      font-family: "Pixelated MS Sans Serif", "MS Sans Serif", Tahoma, sans-serif;
      font-size: 22px; font-weight: bold;
      letter-spacing: 0.02em; line-height: 1;
    }
    .brand .dot { display: inline-block; width: 9px; height: 9px;
      background: #000; margin-right: 7px; vertical-align: 2px; }

    .site-meta {
      font-size: 11px; color: var(--ink); line-height: 1.4;
      text-align: right;
    }
    .site-meta .vol { letter-spacing: 0.04em; }
    .site-meta a { color: var(--link); }
    .site-meta a:visited { color: var(--link-visited); }

    .site-nav {
      display: flex; gap: 4px; align-items: center;
      padding: 8px 0 0;
      font-size: 11px;
    }
    .site-nav .spacer { flex: 1; }
    .site-nav .count { color: var(--ink-soft); }

    /* ── intro strip ── */
    .intro {
      padding: 14px 0 18px;
      max-width: 720px;
      font-size: 13px; line-height: 1.5;
    }
    .intro b { font-weight: bold; }

    /* ── 90s department store headshot ── */
    .headshot-plain {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border: 1px solid var(--ink);
      display: block;
    }
    @media (max-width: 640px) {
      .intro-row { grid-template-columns: 1fr; }
      .headshot-plain { width: 96px; height: 96px; }
    }

    /* ── product grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 22px 18px;
    }
    @media (max-width: 980px) { .grid { grid-template-columns: repeat(3, minmax(0,1fr)); } }
    @media (max-width: 720px) { .grid { grid-template-columns: repeat(2, minmax(0,1fr)); gap: 16px 10px; } }

    .item {
      display: flex; flex-direction: column;
      text-decoration: none; color: inherit;
      cursor: pointer;
    }
    .item .meta-row {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 10px;
      font-size: 12px; line-height: 1.3;
      margin-bottom: 6px;
      min-height: 16px;
    }
    .item .name {
      text-transform: uppercase;
      letter-spacing: 0.02em;
      font-weight: bold;
      color: var(--ink);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      flex: 1; min-width: 0;
    }
    .item .price {
      color: var(--ink); white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .item .price.sold { color: #aa0000; }

    .item .frame {
      aspect-ratio: 1 / 1;
      background: #fff;
      border: 1px solid var(--ink);
      box-shadow: inset -1px -1px 0 #fff, inset 1px 1px 0 #f0f0f0;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      transition: background 120ms ease;
    }
    .item:hover .frame { background: #f5f5f5; }
    .item .frame img {
      width: 100%; height: 100%; object-fit: contain;
      image-rendering: -webkit-optimize-contrast;
    }
    .item .ph {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; padding: 12px; box-sizing: border-box;
      color: #888; text-align: center;
    }
    .item .ph .ph-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
      color: #666; line-height: 1.2;
    }
    .item .ph svg { opacity: 0.6; }

    .item .sub {
      margin-top: 6px;
      font-size: 11px; color: var(--ink-soft);
      line-height: 1.3;
      display: flex; gap: 4px; align-items: baseline;
    }
    .item .num {
      font-family: "Pixelated MS Sans Serif", "MS Sans Serif", monospace;
      color: #888;
    }
    .item .spec { color: var(--ink-soft); }

    /* ── footer ── */
    footer.site {
      margin-top: 56px; padding-top: 14px;
      border-top: 1px solid var(--ink);
      display: flex; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      font-size: 11px;
    }
    footer.site .links { display: flex; gap: 14px; }
    footer.site a { color: var(--link); }
    footer.site a:visited { color: var(--link-visited); }
    footer.site .copyr { color: var(--ink-soft); }

    /* ── empty state ── */
    .empty {
      grid-column: 1 / -1;
      padding: 48px 16px; text-align: center;
      border: 1px dashed var(--rule);
      color: var(--ink-soft);
      display: flex; flex-direction: column; gap: 12px; align-items: center;
    }
    .empty b { color: var(--ink); }

    /* ── edit dialog ── */
    .dialog-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0, 0, 0, 0.25);
      display: none; align-items: flex-start; justify-content: center;
      padding: 28px 16px;
      overflow: auto;
    }
    .dialog-overlay.open { display: flex; }
    .edit-window { width: min(680px, 100%); }
    .edit-window .window-body {
      max-height: calc(100vh - 160px); overflow: auto;
      padding: 12px;
    }
    .form-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    @media (max-width: 540px) { .form-grid { grid-template-columns: 1fr; } }
    .form-row { display: flex; flex-direction: column; gap: 2px; }
    .form-row label { font-size: 11px; }
    .form-row input { font-family: inherit; font-size: 12px; }

    .item-edit-row {
      display: grid; grid-template-columns: 48px 1fr auto;
      gap: 8px; align-items: center;
      padding: 6px 4px;
      border-bottom: 1px dotted #aaa;
    }
    .item-edit-row:last-child { border-bottom: 0; }
    .thumb-sm {
      width: 48px; height: 48px;
      background: #fff; border: 1px solid #000;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; font-size: 9px; color: #888;
    }
    .thumb-sm img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .item-edit-row .info b { font-size: 12px; }
    .item-edit-row .info small {
      display: block; font-size: 11px; color: #555;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 100%;
    }
    .actions { display: flex; gap: 2px; }

    /* misc */
    .row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .muted { color: var(--ink-soft); }
    .right { text-align: right; }
  </style>
</head>
<body>

  <div class="wrap">

    <!-- header -->
    <header class="site">
      <div>
        <div class="brand"><span class="dot" style="color: rgb(0, 38, 255); background-color: rgb(0, 38, 255)"></span><span style="color: rgb(0, 38, 255)">PEDRO&rsquo;S WISHLIST</span></div>
        <div class="muted" style="margin-top:4px; font-size: 11px;">
          A small index of things, kept short.
        </div>
      </div>
      <div class="site-meta">
        <div class="vol">VOL. 01 · WISHLIST</div>
        <div>Last updated <span id="last-updated">May 1, 2026</span></div>
      </div>
    </header>

    <div class="site-nav">
      <span class="count" id="count-label">— items</span>
      <span class="spacer"></span>
    </div>

    <!-- intro -->
    <p class="intro">
      Consider this less a wishlist and more a window into my unresolved consumer thoughts.
    </p>
    <img class="headshot-plain" src="images/pedro.jpg" alt="Pedro">
</div>
    <!-- grid -->
    <div class="grid" id="grid"></div>

    <!-- footer -->
    <footer class="site">
      <div class="links">
        <a href="#">Email</a>
        <a href="#">Address</a>
        <a href="#">Notes</a>
      </div>
      <div class="copyr">Pedro&rsquo;s Wish List &copy; 2026</div>
    </footer>
  </div>

<script>
(function () {
  // ─── data ──────────────────────────────────────────────
  // The list is loaded from products.json in the same folder.
  // To add/edit/remove items, edit products.json on github.com.
  var products = [];

  function escapeHtml(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c];
    });
  }
  function pad2(n) { return String(n).padStart(2, "0"); }

  // ─── render: grid ──────────────────────────────────────
  function renderGrid() {
    var grid = document.getElementById("grid");
    document.getElementById("count-label").textContent =
      pad2(products.length) + " " + (products.length === 1 ? "item" : "items");

    if (!products.length) {
      grid.innerHTML =
        '<div class="empty"><b>The list is empty.</b>' +
        '<div>Edit products.json on GitHub to add items.</div></div>';
      return;
    }

    grid.innerHTML = products.map(function (p, i) {
      var img = p.image
        ? '<img src="' + escapeHtml(p.image) + '" alt="' + escapeHtml(p.name) + '">'
        : '<div class="ph">'
          + '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">'
            + '<rect x="3" y="3" width="18" height="18"/><circle cx="9" cy="9" r="1.5"/><path d="M21 15l-5-5L5 21"/>'
          + '</svg>'
          + '<div class="ph-title">' + escapeHtml(p.brand || p.name || "—") + '</div>'
          + '</div>';

      var subBits = [];
      subBits.push('<span class="num">' + pad2(i + 1) + '</span>');
      if (p.brand) subBits.push('<span>' + escapeHtml(p.brand) + '</span>');
      if (p.spec)  subBits.push('<span class="spec">' + escapeHtml(p.spec) + '</span>');

      var inner = ''
        + '<div class="meta-row">'
        +   '<span class="name">' + escapeHtml(p.name || "Untitled") + '</span>'
        +   (p.price ? '<span class="price">' + escapeHtml(p.price) + '</span>' : '')
        + '</div>'
        + '<div class="frame">' + img + '</div>'
        + '<div class="sub">' + subBits.join(' &middot; ') + '</div>';

      if (p.url) {
        return '<a class="item" href="' + escapeHtml(p.url)
          + '" target="_blank" rel="noopener">' + inner + '</a>';
      }
      return '<div class="item">' + inner + '</div>';
    }).join("");
  }

  // ─── boot ──────────────────────────────────────────────
  fetch('products.json', { cache: 'no-store' })
    .then(function (r) {
      if (!r.ok) throw new Error('Failed to load products.json (' + r.status + ')');
      return r.json();
    })
    .then(function (data) {
      if (Array.isArray(data)) products = data;
      renderGrid();
    })
    .catch(function (err) {
      console.error(err);
      document.getElementById('grid').innerHTML =
        '<div class="empty"><b>Could not load products.json.</b>' +
        '<div>' + escapeHtml(err.message) + '</div></div>';
    });
})();
</script>
</body>
</html>
